environment: production

databases:
  postgres:
    enabled: true
    host: "${POSTGRES_HOST:postgres}"
    port: 5432
    database: "${POSTGRES_DB:ascended_prod}"
    vector: true
  redis:
    enabled: true
    host: "${REDIS_HOST:redis}"
    port: 6379
  object_storage:
    enabled: true
    provider: s3
    bucket: "${S3_BUCKET:ascended-prod}"
    region: "${AWS_REGION:us-east-1}"
  qdrant:
    enabled: true
    host: "${QDRANT_HOST:qdrant}"
    port: 6333
  graph:
    enabled: false
    host: "${NEO4J_HOST:neo4j}"
    port: 7687
  analytics:
    enabled: false
    host: "${CLICKHOUSE_HOST:clickhouse}"
    port: 8123
  streaming:
    enabled: false
    brokers: "${KAFKA_BROKERS:kafka:9092}"

gateway:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  log_level: info

security:
  jwt_algorithm: HS256
  access_token_expire_minutes: 30
