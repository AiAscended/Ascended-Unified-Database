name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint dependencies
        run: pip install flake8==7.0.0 flake8-bugbear
      - name: Run flake8
        run: flake8 gateway/ tools/ --max-line-length=120 --extend-ignore=E203,W503

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install bandit==1.7.9
      - name: Run bandit
        run: bandit -r gateway/ tools/ --skip B101 -ll

  validate:
    name: Config & Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install PyYAML==6.0.1
      - name: Run validator
        run: python3 -m tools.validator.validator

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: false
          tags: ascended/gateway:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov PyYAML==6.0.1
          pip install -r gateway/requirements.txt
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=gateway/app --cov-report=term-missing
        env:
          ENVIRONMENT: dev
          JWT_SECRET_KEY: test-secret-key-for-ci-only
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
