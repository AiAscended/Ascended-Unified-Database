name: CD Production

on:
  push:
    branches:
      - main

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Prod Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/ascended/gateway:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/ascended/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  approval:
    name: Manual Approval Gate
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: {}
    environment: production
    steps:
      - name: Approved
        run: echo "Deployment approved for production."

  blue-green-deploy:
    name: Blue/Green Deploy to Production
    needs: approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}

      - name: Deploy green (new version)
        run: |
          IMAGE=${{ secrets.REGISTRY_URL }}/ascended/gateway:${{ github.sha }}
          kubectl set image deployment/gateway gateway="${IMAGE}" -n ascended-db
          kubectl annotate deployment/gateway \
            kubernetes.io/change-cause="Deploy ${{ github.sha }} by ${{ github.actor }}" \
            -n ascended-db --overwrite

      - name: Wait for green rollout
        run: kubectl rollout status deployment/gateway -n ascended-db --timeout=300s

      - name: Health check
        run: |
          kubectl run prod-health-check --image=curlimages/curl:latest --restart=Never \
            --rm -i --namespace=ascended-db \
            -- curl -sf http://gateway:8000/ready

      - name: Tag image as stable
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_URL }}/ascended/gateway
          tags: type=raw,value=stable

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/gateway -n ascended-db
          echo "Rollback executed."
