name: Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    name: Run Ascended Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validator dependencies
        run: pip install PyYAML==6.0.1
      - name: Run full validation suite
        run: python3 -m tools.validator.validator
