name: CD Enterprise

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-enterprise"

concurrency:
  group: cd-enterprise
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Enterprise Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push enterprise image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/ascended/gateway:${{ steps.version.outputs.version }}
            ${{ secrets.REGISTRY_URL }}/ascended/gateway:enterprise
          build-args: |
            ENVIRONMENT=enterprise
          cache-from: type=gha
          cache-to: type=gha,mode=max

  canary-deploy:
    name: Canary Rollout (10% traffic)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: enterprise
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.ENTERPRISE_KUBECONFIG }}

      - name: Deploy canary (1 of N replicas)
        run: |
          IMAGE=${{ secrets.REGISTRY_URL }}/ascended/gateway:${{ needs.build-and-push.outputs.version }}
          kubectl set image deployment/gateway gateway="${IMAGE}" -n ascended-db
          kubectl rollout status deployment/gateway -n ascended-db --timeout=300s

      - name: Monitor canary (2 minutes)
        run: |
          echo "Monitoring canary for 120 seconds..."
          sleep 120
          kubectl run enterprise-canary-check --image=curlimages/curl:latest --restart=Never \
            --rm -i --namespace=ascended-db \
            -- curl -sf http://gateway:8000/ready

      - name: Full rollout
        run: |
          kubectl rollout status deployment/gateway -n ascended-db --timeout=300s
          echo "Canary promoted to full rollout."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: Enterprise Release ${{ needs.build-and-push.outputs.version }}
          generate_release_notes: true

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/gateway -n ascended-db
          echo "Canary rollback executed."
