name: CD Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: cd-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push Dev Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_URL }}/ascended/gateway
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev K8s
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBECONFIG }}
      - name: Apply Kustomize overlay
        run: |
          kubectl kustomize k8s/overlays/dev | \
            kubectl apply -f - -n ascended-db
      - name: Update gateway image
        run: |
          kubectl set image deployment/gateway \
            gateway=${{ secrets.REGISTRY_URL }}/ascended/gateway:dev-${{ github.sha }} \
            -n ascended-db
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway -n ascended-db --timeout=180s
      - name: Smoke test
        run: |
          kubectl run smoke-test --image=curlimages/curl:latest --restart=Never \
            --rm -i --namespace=ascended-db \
            -- curl -sf http://gateway:8000/health
