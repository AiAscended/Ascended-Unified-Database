apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: ascended-db
  labels:
    app: gateway
---
apiVersion: policy/v1beta1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: ascended-db
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway
---
# Default security context applied at the namespace level via LimitRange
apiVersion: v1
kind: LimitRange
metadata:
  name: ascended-db-limits
  namespace: ascended-db
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ascended-db-quota
  namespace: ascended-db
spec:
  hard:
    pods: "50"
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    persistentvolumeclaims: "20"
    services: "20"
    secrets: "50"
    configmaps: "50"
