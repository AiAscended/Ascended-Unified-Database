apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ascended-db

resources:
  - ../../base/namespace.yaml
  - ../../base/gateway-deployment.yaml
  - ../../base/gateway-service.yaml
  - ../../base/ingress.yaml
  - ../../databases/postgres-statefulset.yaml
  - ../../databases/redis-deployment.yaml
  - ../../databases/qdrant-deployment.yaml
  - ../../databases/neo4j-deployment.yaml
  - ../../databases/clickhouse-deployment.yaml
  - ../../databases/kafka-deployment.yaml
  - ../../databases/minio-deployment.yaml
  - ../../autoscaling/gateway-hpa.yaml
  - ../../autoscaling/keda-scalers.yaml
  - ../../observability/prometheus.yaml
  - ../../observability/grafana.yaml
  - ../../observability/loki.yaml
  - ../../observability/jaeger.yaml
  - ../../security/network-policies.yaml
  - ../../security/pod-security.yaml

configMapGenerator:
  - name: gateway-config
    literals:
      - ENVIRONMENT=enterprise
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=ascended_enterprise
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - NEO4J_HOST=neo4j
      - CLICKHOUSE_HOST=clickhouse
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_PREFIX=ascended
  - name: postgres-config
    literals:
      - POSTGRES_DB=ascended_enterprise
  - name: clickhouse-config
    literals:
      - CLICKHOUSE_DB=ascended

images:
  - name: ascended/gateway
    newTag: enterprise

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
    target:
      kind: Deployment
      name: gateway
