image:
  repository: pgvector/pgvector
  tag: pg16
  pullPolicy: IfNotPresent

database:
  name: ascended
  user: postgres

storage:
  size: 50Gi
  storageClass: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

service:
  port: 5432

initScript:
  enabled: true
  path: /docker-entrypoint-initdb.d/

persistence:
  enabled: true
  accessMode: ReadWriteOnce
